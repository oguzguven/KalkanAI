version: '3.8'

services:
  # 1. HAFIZA MERKEZİ: KalkanAI'nin Beyni (Redis)
  redis-brain:
    image: redis:7-alpine
    container_name: kalkan-redis-brain
    ports:
      - "6379:6379"
    volumes:
      - kalkan_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # 2. ANA MOTOR: KalkanAI Gateway
  kalkan-engine:
    build: .
    container_name: kalkan-ai-gateway
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      # KalkanAI artık Redis'i localhost'ta değil, izole ağdaki 'redis-brain' adıyla arayacak!
      - REDIS_URL=redis://redis-brain:6379/
      - UPSTREAM_URL=http://host.docker.internal:11434/v1/chat/completions
    depends_on:
      - redis-brain
    restart: unless-stopped

# Verilerin kaybolmaması için kalıcı disk alanı
volumes:
  kalkan_data:
services:
  # 1. VEKTÖREL HAFIZA MERKEZİ: KalkanAI'nin Gelişmiş Beyni (Redis Stack)
  redis-brain:
    image: redis/redis-stack-server:latest  # 🎯 GÜNCELLENDI: Standart Redis yerine Vektör Arama destekleyen Stack sürümü!
    container_name: kalkan-redis-brain
    ports:
      - "6379:6379"
      - "8001:8001" # 📡 YENİ: Redis Insight arayüzü (Veritabanını görsel izlemek için)
    volumes:
      - kalkan_data:/data
    restart: unless-stopped

  # 2. ANA MOTOR: KalkanAI Gateway
  kalkan-engine:
    build: .
    container_name: kalkan-ai-gateway
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - REDIS_URL=redis://redis-brain:6379/
      - UPSTREAM_URL=http://host.docker.internal:11434/v1/chat/completions
      # 🎯 YENİ: Ollama'nın vektör üretim bandının adresi
      - EMBEDDING_URL=http://host.docker.internal:11434/api/embeddings
    depends_on:
      - redis-brain
    restart: unless-stopped

volumes:
  kalkan_data: